  <!-- Vertical divider -->
  <line x1="380" y1="80" x2="380" y2="550" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Right side: text content -->
  <!-- "gelatops" wordmark -->
  <text
    x="420"
    y="230"
    font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="80"
    fill="#FFFFFF"
    letter-spacing="-2"
  >gelatops</text>

  <!-- Teal accent underline -->
  <rect x="420" y="248" width="320" height="4" rx="2" fill="#00C9D0"/>

  <!-- Tagline line 1 -->
  <text
    x="420"
    y="308"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="26"
    fill="rgba(255,255,255,0.8)"
  >The all-in-one management platform</text>

  <!-- Tagline line 2 -->
  <text
    x="420"
    y="344"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="26"
    fill="rgba(255,255,255,0.8)"
  >for artisan gelato &amp; ice cream businesses.</text>

  <!-- Feature pills -->
  <g transform="translate(420, 390)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="130" height="34" rx="17" fill="rgba(0,201,208,0.15)" stroke="#00C9D0" stroke-width="1"/>
    <text x="65" y="22" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="500" fill="#00C9D0" text-anchor="middle">Recipes &amp; Costs</text>
    <!-- Pill 2 -->
    <rect x="144" y="0" width="160" height="34" rx="17" fill="rgba(0,201,208,0.15)" stroke="#00C9D0" stroke-width="1"/>
    <text x="224" y="22" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="500" fill="#00C9D0" text-anchor="middle">Production Planning</text>
    <!-- Pill 3 -->
    <rect x="318" y="0" width="150" height="34" rx="17" fill="rgba(0,201,208,0.15)" stroke="#00C9D0" stroke-width="1"/>
    <text x="393" y="22" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="500" fill="#00C9D0" text-anchor="middle">Order Integration</text>
    <!-- Pill 4 -->
    <rect x="0" y="46" width="148" height="34" rx="17" fill="rgba(0,201,208,0.15)" stroke="#00C9D0" stroke-width="1"/>
    <text x="74" y="68" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="500" fill="#00C9D0" text-anchor="middle">Allergen Tracking</text>
    <!-- Pill 5 -->
    <rect x="162" y="46" width="140" height="34" rx="17" fill="rgba(0,201,208,0.15)" stroke="#00C9D0" stroke-width="1"/>
    <text x="232" y="68" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="500" fill="#00C9D0" text-anchor="middle">Shopping Lists</text>
  </g>

  <!-- URL -->
  <text
    x="420"
    y="548"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="500"
    font-size="18"
    fill="rgba(255,255,255,0.4)"
    letter-spacing="0.5"
  >gelatops.com</text>

  <!-- Teal bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="#00C9D0"/>
</svg>
