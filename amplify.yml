# gelatops.com — AWS Amplify Static Hosting
# After deploying, connect the custom domain in:
# Amplify Console → App → Domain management → Add domain → gelatops.com
# Amplify will automatically provision an SSL certificate via ACM.
# Set DNS records at your domain registrar as instructed by Amplify.

version: 1
frontend:
  phases:
    build:
      commands:
        - node build.js
  artifacts:
    baseDirectory: /dist
    files:
      - '**/*'
  cache:
    paths: []
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'X-Frame-Options'
          value: 'DENY'
        - key: 'X-Content-Type-Options'
          value: 'nosniff'
        - key: 'Referrer-Policy'
          value: 'strict-origin-when-cross-origin'
        - key: 'Permissions-Policy'
          value: 'camera=(), microphone=(), geolocation=()'
        - key: 'Strict-Transport-Security'
          value: 'max-age=31536000; includeSubDomains; preload'
        - key: 'Content-Security-Policy'
          value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://plausible.io; img-src 'self' https: data:; frame-ancestors 'none';"
  customRules:
    - source: /it/<*>
      target: /it/404.html
      status: '404'
    - source: /de/<*>
      target: /de/404.html
      status: '404'
    - source: /<*>
      target: /404.html
      status: '404'
